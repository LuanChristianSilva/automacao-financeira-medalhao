<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro</title>
    <meta name="description" content="Dashboard financeiro pessoal com controle de receitas e despesas.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Defer JS -->
    <script src="js/main.js" defer></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <h2>FinDash</h2>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="#" class="active"><span class="icon">📊</span> Visão Geral</a></li>
                    <li><a href="#"><span class="icon">💸</span> Transações</a></li>
                    <li><a href="#"><span class="icon">📈</span> Investimentos</a></li>
                    <li><a href="#"><span class="icon">⚙️</span> Configurações</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div>
                    <h1>Olá, Luan!</h1>
                    <p>Aqui está o resumo das suas finanças.</p>
                </div>
                <div class="header-actions">
                    <select id="monthFilter" class="month-filter">
                        <!-- Populated by JS -->
                    </select>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Luan&background=random" alt="Avatar do usuário">
                    </div>
                </div>
            </header>

            <!-- Dashboard Cards -->
            <section class="overview-cards">
                <article class="card balance-card">
                    <h3>Saldo Total</h3>
                    <p class="amount" id="overview-saldo">R$ 0,00</p>
                    <span class="trend" id="trend-saldo">--</span>
                </article>
                <article class="card income-card">
                    <h3>Receitas</h3>
                    <p class="amount" id="overview-receitas">R$ 0,00</p>
                    <span class="trend" id="trend-receitas">--</span>
                </article>
                <article class="card expense-card">
                    <h3>Despesas</h3>
                    <p class="amount" id="overview-despesas">R$ 0,00</p>
                    <span class="trend" id="trend-despesas">--</span>
                </article>
                <article class="card saving-card">
                    <h3>Economias (Saldo % Renda)</h3>
                    <p class="amount" id="overview-economias">0%</p>
                    <span class="trend" id="trend-economias">--</span>
                </article>
            </section>

            <!-- Charts and Activity Area -->
            <section class="dashboard-grid">
                <!-- Data Chart -->
                <article class="chart-container card">
                    <h2>Fluxo de Caixa Mensal</h2>
                    <div class="canvas-wrapper" style="position: relative; height: 300px; width: 100%;">
                        <canvas id="cashflowChart"></canvas>
                    </div>
                </article>

                <!-- Recent Transactions -->
                <article class="transactions-container card">
                    <h2>Transações Recentes</h2>
                    <div class="transaction-list" id="transactionList">
                        <!-- Populated by JS -->
                    </div>
                    <button class="btn-primary" id="addTransactionBtn">Nova Transação</button>
                </article>
            </section>
        </main>
    </div>
</body>
</html>
<!-- A estrutura HTML acima utiliza tags semânticas (header, nav, main, article, section, aside) e carrega o CSS/JS corretamente conforme as boas práticas. -->
